# MASEST commerce — Netlify config. Publishes this repo's root site + serverless functions.
# Lives on the `netlify-commerce` branch only; GitHub Pages (main) is unaffected.
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

# Keep backend source / internal files out of the published static root.
# force=true is required so these win over the real files that exist at these paths.
[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/supabase/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/tools/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true
