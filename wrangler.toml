# Cloudflare Pages config for the MASEST commerce app.
# Static assets are assembled into dist/ by `node tools/cf-build.mjs` (the Pages build
# command); serverless endpoints live in functions/ and are compiled by Pages automatically.
# nodejs_compat enables Buffer/process shims needed by health.js + the SDKs.
# Lives on the `netlify-commerce` branch; GitHub Pages (main) is untouched. Netlify still
# deploys the same branch in parallel — this file is ignored by Netlify.
name = "masest-commerce"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
