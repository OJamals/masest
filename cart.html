<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart | MASEST</title>
  <meta name="description" content="Review VertKleen purchase-ready SKUs, start checkout, or route quote-only products to MASEST.">
  <link rel="stylesheet" href="vendor/satoshi/satoshi.css">
  <link rel="stylesheet" href="vendor/phosphor/style.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js" defer></script>
  <script src="js/main.js" defer></script>
</head>
<body>
<noscript>
  <nav class="nojs-nav" aria-label="Site">
    <a href="index.html"><b>MASEST</b></a>
    <a href="products.html">Products</a>
    <a href="programs.html">Programs</a>
    <span>Use Cases</span>
    <a href="industries.html">Industries</a>
    <a href="proof.html">Field Results</a>
    <a href="resources.html">Resources</a>
    <a href="contact.html?type=quote">Request a Quote</a>
  </nav>
</noscript>
<main id="main">
  <section class="section">
    <div class="container cart-shell">
      <div class="cart-panel">
        <div class="section-head">
          <p class="eyebrow">Order lines</p>
          <h1>Your cart</h1>
        </div>
        <div id="cartLines" class="cart-lines" aria-live="polite"></div>
        <div id="cartEstimate" class="cart-estimate" hidden aria-live="polite"></div>
      </div>

      <aside class="cart-summary" aria-label="Cart checkout">
        <p class="eyebrow">Next step</p>
        <h2>Checkout or quote.</h2>
        <p id="cartStatus" class="cart-status" role="status" aria-live="polite">Cart totals are confirmed at checkout by the server.</p>
        <div class="ship-est" id="shipEst" hidden>
          <label class="field-label" for="shipZone">Estimated freight</label>
          <select id="shipZone" class="cart-input">
            <option value="east">US East</option>
            <option value="central">US Central</option>
            <option value="west">US West</option>
          </select>
          <p class="ship-est-out" id="shipEstOut"></p>
          <p class="ship-est-note">Estimate only — final freight confirmed on your invoice.</p>
        </div>
        <label class="field-label" for="checkoutEmail">Email for receipt</label>
        <input id="checkoutEmail" class="cart-input" type="email" autocomplete="email" placeholder="buyer@company.com">
        <div class="cart-actions">
          <button class="btn btn-primary" id="checkoutPay" type="button">Card / ACH Checkout</button>
          <button class="btn btn-secondary" id="checkoutNet" type="button">Use NET Terms</button>
          <a class="btn btn-ghost" id="checkoutQuote" href="contact.html?type=quote">Send Quote Request</a>
        </div>
      </aside>
    </div>
  </section>
</main>
<script type="module">
  import { checkout, clear, items, remove, setQty } from "./js/cart.js";

  const money = (n) => new Intl.NumberFormat("en-US", {
    style: "currency", currency: "USD", maximumFractionDigits: Number(n) % 1 === 0 ? 0 : 2
  }).format(Number(n));
  const priceMoney = (n, currency = "USD") => new Intl.NumberFormat("en-US", {
    style: "currency", currency: String(currency || "USD").toUpperCase(), minimumFractionDigits: 2, maximumFractionDigits: 2
  }).format(Number(n));

  // vsku -> { name, gallons, price, currency }, flattened from /api/products variants.
  const vmap = new Map();
  const fallbackNames = {
    crhd: "VertKleen CR-HD",
    hcr: "VertKleen HCR",
  };
  async function loadCatalog() {
    try {
      const r = await fetch("/api/products");
      if (!r.ok) return;
      const data = await r.json();
      (data.products || []).forEach(p => {
        const variants = Array.isArray(p.product_variants) ? p.product_variants : [];
        if (!variants.length) {
          vmap.set(p.sku, {
            name: p.name,
            gallons: 0,
            price: p.price == null ? null : Number(p.price),
            currency: p.currency || "usd",
            purchasable: p.active !== false && p.mode === "buy" && p.price != null,
          });
          return;
        }
        variants.forEach(v => {
          if (!v || !v.vsku) return;
          vmap.set(v.vsku, {
            name: `${p.name} — ${v.label}`,
            gallons: Number(v.gallons) || 0,
            price: v.price == null ? null : Number(v.price),
            currency: v.currency || p.currency || "usd",
            purchasable: p.active !== false && p.mode === "buy" && v.active !== false && v.price != null,
          });
        });
      });
    } catch (err) { /* offline: fall back to raw SKUs, no shipping estimate */ }
  }

  // Example freight rates: per-gallon by US zone, with a handling floor. Owner tunes these.
  const ZONE_RATE = { east: 3.50, central: 4.25, west: 5.00 };
  const SHIP_MIN = 35;

  const lines = document.getElementById("cartLines");
  const estimate = document.getElementById("cartEstimate");
  const status = document.getElementById("cartStatus");
  const email = document.getElementById("checkoutEmail");
  const checkoutPay = document.getElementById("checkoutPay");
  const checkoutNet = document.getElementById("checkoutNet");
  const checkoutQuote = document.getElementById("checkoutQuote");

  // NET terms require an approved business account. Pull the Supabase session token
  // (persisted in localStorage from a prior account.html login). Returns null if the
  // user is logged out or the auth client/CDN is unavailable.
  async function getAuthToken() {
    try {
      const { supabase } = await import("./js/auth.js");
      if (!supabase) return null;
      const { data } = await supabase.auth.getSession();
      return data?.session?.access_token || null;
    } catch (err) {
      return null;
    }
  }

  function setCheckoutDisabled(disabled) {
    checkoutPay.disabled = disabled;
    checkoutNet.disabled = disabled;
  }

  function checkoutErrorMessage(err) {
    if (err?.code === "not_purchasable") {
      return err.message || "Some SKUs are quote-only or not yet priced. Send a quote request and MASEST will confirm availability.";
    }
    if (err?.code === "auth_required_for_net") {
      return "NET terms require an approved business account. Send a quote request and MASEST will confirm account terms.";
    }
    if (err?.code === "net_terms_unavailable") {
      return "NET terms are not available for this account yet. Send a quote request for approval and terms review.";
    }
    if (err?.code === "stripe_not_configured") {
      return "Online checkout is not configured yet. Send a quote request and MASEST will complete the order path.";
    }
    if (err?.message === "cart_empty") return "Add at least one product before checkout.";
    return "Checkout is not available for this cart. Send a quote request and MASEST will confirm the order path.";
  }

  function productName(sku) {
    const fallback = fallbackNames[String(sku).toLowerCase()];
    const name = vmap.get(sku)?.name || fallback || sku;
    return fallback && name === "VertKleen CRHD" ? fallback : name;
  }

  function quoteUrl(cartItems) {
    const params = new URLSearchParams({ type: "quote" });
    const receiptEmail = email?.value?.trim();
    if (receiptEmail) params.set("email", receiptEmail);
    if (cartItems.length) {
      params.set("cart", cartItems.map((item) => `${item.sku}:${item.qty}`).join(","));
      params.set("message", `Cart quote request: ${cartItems.map((item) => `${productName(item.sku)} x ${item.qty}`).join("; ")}.`);
    }
    return `contact.html?${params.toString()}`;
  }

  function syncQuoteHref() {
    if (checkoutQuote) checkoutQuote.href = quoteUrl(items());
  }

  function render() {
    const cartItems = items();
    syncQuoteHref();
    const hasBlockedLine = cartItems.some(item => {
      const meta = vmap.get(item.sku);
      return meta && !meta.purchasable;
    });
    setCheckoutDisabled(cartItems.length === 0 || hasBlockedLine);
    if (hasBlockedLine) {
      status.dataset.state = "err";
      status.textContent = "Remove quote-only items before checkout, or send a quote request.";
    } else if (status.dataset.state === "err" && cartItems.length) {
      status.dataset.state = "";
      status.textContent = "Cart totals are confirmed at checkout by the server.";
    }
    if (!cartItems.length) {
      lines.innerHTML = `<div class="cart-empty"><h3>No products in the cart.</h3><p>Use the product catalog to add purchase-ready SKUs, or send a quote request for volume pricing.</p><a class="btn btn-primary" href="products.html">Browse Products</a></div>`;
      updateSubtotal();
      updateShipping();
      return;
    }
    lines.innerHTML = cartItems.map(item => `
      <article class="cart-line">
        <div>
          <span class="eyebrow">${item.sku}</span>
          <h3>${productName(item.sku)}</h3>
          <p>${vmap.get(item.sku)?.purchasable ? priceMoney(vmap.get(item.sku).price, vmap.get(item.sku).currency) + " each · " : vmap.get(item.sku) ? "Quote required · " : ""}freight + tax confirmed at checkout.</p>
        </div>
        <label>
          <span>Qty</span>
          <input type="number" min="1" step="1" value="${item.qty}" data-qty="${item.sku}">
        </label>
        <button type="button" class="btn btn-ghost" data-remove="${item.sku}">Remove</button>
      </article>
    `).join("");
    updateSubtotal();
    updateShipping();
  }

  function updateSubtotal() {
    if (!estimate) return;
    let subtotal = 0;
    let hasPrice = false;
    items().forEach(item => {
      const meta = vmap.get(item.sku);
      if (!meta?.purchasable || meta.price == null) return;
      subtotal += Number(meta.price) * item.qty;
      hasPrice = true;
    });
    estimate.hidden = !hasPrice;
    if (!hasPrice) return;
    estimate.innerHTML = `
      <div><span>Estimated product subtotal</span><strong>${priceMoney(subtotal)}</strong></div>
      <p>Taxes, shipping, freight, and final availability are confirmed by the server at checkout.</p>
    `;
  }

  // Shipping estimate: total gallons (from variants) × per-gallon zone rate, with a handling floor.
  function updateShipping() {
    const box = document.getElementById("shipEst");
    const out = document.getElementById("shipEstOut");
    if (!box || !out) return;
    const gallons = items().reduce((s, it) => s + (vmap.get(it.sku)?.gallons || 0) * it.qty, 0);
    if (!gallons) { box.hidden = true; return; }
    box.hidden = false;
    const zone = document.getElementById("shipZone")?.value || "east";
    const est = Math.max(SHIP_MIN, gallons * (ZONE_RATE[zone] || ZONE_RATE.east));
    out.textContent = `${gallons} gal → est. ${money(est)}`;
  }

  lines.addEventListener("change", event => {
    const sku = event.target?.dataset?.qty;
    if (!sku) return;
    setQty(sku, event.target.value);
    render();
  });
  lines.addEventListener("input", event => {
    const sku = event.target?.dataset?.qty;
    if (!sku) return;
    setQty(sku, event.target.value);
    syncQuoteHref();
    updateSubtotal();
    updateShipping();
  });
  lines.addEventListener("click", event => {
    const sku = event.target?.dataset?.remove;
    if (!sku) return;
    remove(sku);
    render();
  });

  async function runCheckout(mode) {
    if (!items().length) {
      status.dataset.state = "err";
      status.textContent = "Add at least one product before checkout.";
      setCheckoutDisabled(true);
      return;
    }
    setCheckoutDisabled(true);
    status.dataset.state = "";
    status.textContent = mode === "net" ? "Checking account terms..." : "Starting checkout...";
    let token;
    if (mode === "net") {
      token = await getAuthToken();
      if (!token) {
        status.dataset.state = "err";
        status.textContent = "Sign in to your approved business account to use NET terms, or send a quote request.";
        setCheckoutDisabled(items().length === 0);
        return;
      }
    }
    try {
      const result = await checkout({ mode, email: email.value.trim(), token });
      if (result.net) {
        status.dataset.state = "ok";
        status.textContent = result.message || "Order placed on account.";
        clear();
        render();
      }
    } catch (err) {
      status.dataset.state = "err";
      status.textContent = checkoutErrorMessage(err);
      setCheckoutDisabled(items().length === 0);
    }
  }

  checkoutPay.addEventListener("click", () => runCheckout("pay"));
  checkoutNet.addEventListener("click", () => runCheckout("net"));
  email?.addEventListener("input", syncQuoteHref);
  document.getElementById("shipZone")?.addEventListener("change", updateShipping);
  render(); // fast first paint with raw SKUs
  loadCatalog().then(render); // re-render with variant names + shipping once catalog loads
</script>
</body>
</html>
